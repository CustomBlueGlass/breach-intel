version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: breach
      POSTGRES_PASSWORD: breach
      POSTGRES_DB: breach_intel
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db:/docker-entrypoint-initdb.d  # auto-runs schema.sql, materialized_views.sql, seed_sources.sql on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breach"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://breach:breach@postgres:5432/breach_intel
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  scheduler:
    build: ../backend
    command: python -m app.scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://breach:breach@postgres:5432/breach_intel
      REDIS_URL: redis://redis:6379/0
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

volumes:
  pgdata:
