name: Ingest breach sources (every 6 hours)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Database maintenance (idempotent cleanup + view healing)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.maintenance

      - name: Run all collectors
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LEAKIX_API_KEY: ${{ secrets.LEAKIX_API_KEY }}
          HIBP_API_KEY: ${{ secrets.HIBP_API_KEY }}
        run: python -m app.scheduler
