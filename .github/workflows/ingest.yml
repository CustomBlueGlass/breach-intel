name: Ingest breach sources (every 6 hours)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    # A first-time pull from a bulk source (e.g. HIBP's ~800 breaches) runs
    # every record through candidate correlation and needs well over 20
    # minutes; steady-state runs dedup those records in seconds.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          # This job only reads the repo (no pushes), so don't leave the
          # GITHUB_TOKEN persisted in .git/config where a later compromised
          # step could reuse it.
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Database maintenance (idempotent cleanup + view healing)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.maintenance

      - name: Run all collectors
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LEAKIX_API_KEY: ${{ secrets.LEAKIX_API_KEY }}
          HIBP_API_KEY: ${{ secrets.HIBP_API_KEY }}
        run: python -m app.scheduler

      - name: Refresh threat-radar ticker (latest ransomware victims + CISA KEV)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Optional — the ticker adds OTX pulses / URLhaus rows only when
          # these free-tier keys are present; otherwise it runs keyless.
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          URLHAUS_AUTH_KEY: ${{ secrets.URLHAUS_AUTH_KEY }}
        run: python -m app.threat_radar
